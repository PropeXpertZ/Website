<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YES BANK Home Loan | PropXpertz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="page">
  <div id="header-placeholder"></div>
  <main>
    <section class="bank-hero-section">
      <div class="bank-hero-container">
        <div class="bank-hero-left">
          <div class="bank-title-row">
            <img src="assets/logos/banks-std/Yes.png" alt="YES BANK Logo" class="bank-page-logo" onerror="this.style.display='none'">
            <div>
              <h1>YES BANK <span class="gold-text">Home Loan</span></h1>
              <p class="bank-tagline">Flexible repayment options and quick approvals at competitive rates.</p>
            </div>
          </div>
          <div class="bank-highlights">
            <div class="highlight-box"><span class="hl-icon">📈</span><span class="hl-label">Rate</span><span class="hl-val">8.90% p.a</span></div>
            <div class="highlight-box"><span class="hl-icon">💰</span><span class="hl-label">Max Loan</span><span class="hl-val">Up to ₹3 Cr</span></div>
          </div>
        </div>
        <div class="bank-hero-right">
          <div id="loan-contact-placeholder"></div>
        </div>
      </div>
    </section>
    <section class="section">
      <h2 class="section-heading">YES BANK Features</h2>
      <div class="features-table-container">
        <table class="features-table">
          <thead><tr><th>Feature</th><th>Details</th><th>Benefit</th></tr></thead>
          <tbody>
            <tr><td><strong>Interest Rate</strong></td><td>8.90% – 9.50% p.a.</td><td><span class="badge-pill">Flexible</span></td></tr>
            <tr><td><strong>Processing Fee</strong></td><td>Up to 1%</td><td><span class="badge-pill">Transparent</span></td></tr>
            <tr><td><strong>Tenure</strong></td><td>Up to 25 Years</td><td><span class="badge-pill">Balanced</span></td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
  <div id="footer-placeholder"></div>
</div>
<script src="script.js"></script>
</body>
</html>
