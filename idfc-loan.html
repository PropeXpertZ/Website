<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IDFC FIRST Bank Home Loan | PropXpertz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="page">
  <div id="header-placeholder"></div>
<section class="bank-hero-section">
    <div class="bank-hero-container">
        <div class="bank-hero-left">
            <div class="bank-title-row">
                <img src="assets/logos/banks-std/IDFC.png" alt="IDFC Logo" class="bank-page-logo" onerror="this.style.display='none'">
                <div><h1>IDFC <span class="gold-text">Home Loan</span></h1><p class="bank-tagline">Paperless journey with rates starting 8.85% p.a.</p></div>
            </div>
            <div class="bank-highlights">
                <div class="highlight-box"><span class="hl-icon">📈</span><span class="hl-label">Rate</span><span class="hl-val">8.85% p.a</span></div>
                <div class="highlight-box"><span class="hl-icon">⚡</span><span class="hl-label">Approval</span><span class="hl-val">Fast</span></div>
            </div>
        </div>
        <div class="bank-hero-right">
             <div id="loan-contact-placeholder"></div>
        </div>
    </div>
</section>

<section class="sbi-section">
    <h2 class="section-heading">IDFC Features</h2>
    <div class="features-table-container">
        <table class="features-table">
            <thead><tr><th>Feature</th><th>Details</th><th>Benefit</th></tr></thead>
            <tbody>
                <tr><td><strong>Interest Rate</strong></td><td>Starting 8.85% p.a.</td><td><span class="badge-pill">Competitive</span></td></tr>
                <tr><td><strong>Processing Fee</strong></td><td>Up to 3%</td><td><span class="badge-pill">Varies</span></td></tr>
                <tr><td><strong>Prepayment</strong></td><td>5% foreclosure charges</td><td><span class="badge-pill">Terms Apply</span></td></tr>
            </tbody>
        </table>
    </div>
</section>
<div id="footer-placeholder"></div>
</div>
 
<script src="script.js"></script>
</body>
</html>
