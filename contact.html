<head>
  <meta charset="UTF-8">

  <meta name="description" content="Contact PropXpertz to discuss apartments, villas, plots, and commercial properties across Hyderabad. Our experts will assist you end-to-end.">
  <link rel="canonical" href="https://propxpertz.com/contact.html">
  <meta property="og:title" content="Contact PropXpertz">
  <meta property="og:description" content="Talk to our real estate experts for Hyderabad properties and financing.">

  <link rel="stylesheet" href="styles.css">
 
<body>
<div id="page">
  <div id="header-placeholder"></div> 
  <noscript>
    <nav aria-label="Primary">
      <a href="index.html">Home</a> •
      <a href="loan-calculator-tools.html">Loan Tools</a> •
      <a href="offers.html">Offers</a> •
      <a href="apartments.html">Apartments</a> •
      <a href="villas.html">Villas</a> •
      <a href="open-plots.html">Open Plots</a> •
      <a href="commercial.html">Commercial</a>
    </nav>
  </noscript>
<main class="contact-page">
  <section class="contact-section" id="contactSection">
    <h1 class="contact-title">Contact Us</h1>
    <div class="contact-wrapper">
      <form id="contactForm" class="contact-form" onsubmit="handleSubmit(event)">
        <div class="form-group-card">
          <h3 class="subheading">Your Details</h3>
          <label>Full Name</label>
          <input name="name" placeholder="Full Name" required>
          <div id="nameError" class="error"></div>
          <label>Email Address</label>
          <input name="email" type="email" placeholder="Email Address" required>
          <div id="emailError" class="error"></div>
          <label>Mobile Number</label>
          <div class="phone-box">
            <select class="prefix-select">
              <option value="+91">+91 (IN)</option>
              <option value="+1">+1 (US)</option>
              <option value="+44">+44 (UK)</option>
              <option value="+971">+971 (UAE)</option>
            </select>
            <input name="phone" type="tel" placeholder="Enter 10 digit number" required maxlength="10">
          </div>
          <div id="phoneError" class="error"></div>
        </div>
        <div class="form-group-card">
          <h3 class="subheading">Preferences</h3>
          <div class="dropdown-row">
            <div class="select-group">
              <label>Interested In</label>
              <select name="interest" required>
                <option value="">Interested In</option>
                <option>High Rise Apartments</option>
                <option>Villas</option>
                <option>Open Plots</option>
                <option>Farm House</option>
                <option>Commercial</option>
                <option>Large Lands</option>
              </select>
            </div>
            <div class="select-group">
              <label>Budget</label>
              <select name="budget" required>
                <option value="">Budget</option>
                <option>₹20L - ₹50L</option>
                <option>₹50L - ₹1 Cr</option>
                <option>₹1 Cr - ₹3 Cr</option>
                <option>₹3 Cr - ₹5 Cr</option>
                <option>₹5 Cr +</option>
              </select>
            </div>
            <div class="select-group">
              <label>Preferred Locality</label>
              <select name="locality" required>
                <option value="">Locality</option>
                <option>Gachibowli</option>
                <option>Hitech City</option>
                <option>Jubilee Hills</option>
                <option>Kondapur</option>
                <option>Miyapur</option>
                <option>Banjara Hills</option>
                <option>Other</option>
              </select>
            </div>
          </div>
          <div id="interestError" class="error"></div>
          <label>Your Requirements</label>
          <textarea name="message" placeholder="Tell us about your requirements" required></textarea>
          <div id="messageError" class="error"></div>
        </div>
        <input name="honeypot" type="text" style="display:none">
        <button type="submit" class="btn btn-primary">Submit Enquiry</button>
      </form>
    </div>
  </section>
  <section class="success-screen" id="successScreen" style="display:none">
    <h1>Thank You for Contacting PropXpertz</h1>
    <p>We have received your enquiry. Our expert team will get back to you shortly.</p>
    <div class="success-actions">
      <a href="index.html" class="btn btn-primary">Back to Home</a>
      <button class="btn btn-secondary" onclick="resetForm()">Submit Another Enquiry</button>
    </div>
  </section>
</main>
      <div id="footer-placeholder"></div>
</div>

</body>
</html>
