<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Canara Bank Home Loan | PropXpertz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="page">
  <div id="header-placeholder"></div>
  <main>
    <section class="bank-hero-section">
      <div class="bank-hero-container">
        <div class="bank-hero-left">
          <div class="bank-title-row">
            <img src="assets/logos/banks-std/Canara.png" alt="Canara Logo" class="bank-page-logo" onerror="this.style.display='none'">
            <div>
              <h1>Canara <span class="gold-text">Home Loan</span></h1>
              <p class="bank-tagline">Trust-backed financing with rates starting at 8.75% p.a.</p>
            </div>
          </div>
          <div class="bank-highlights">
            <div class="highlight-box"><span class="hl-icon">📈</span><span class="hl-label">Rate</span><span class="hl-val">8.75% p.a</span></div>
            <div class="highlight-box"><span class="hl-icon">💰</span><span class="hl-label">Max Loan</span><span class="hl-val">Up to ₹5 Cr</span></div>
          </div>
        </div>
        <div class="bank-hero-right">
          <div id="loan-contact-placeholder"></div>
        </div>
      </div>
    </section>

    <section class="section">
      <h2 class="section-heading">Canara Features</h2>
      <div class="features-table-container">
        <table class="features-table">
          <thead><tr><th>Feature</th><th>Details</th><th>Benefit</th></tr></thead>
          <tbody>
            <tr><td><strong>Interest Rate</strong></td><td>8.75% – 9.20% p.a.</td><td><span class="badge-pill">Competitive</span></td></tr>
            <tr><td><strong>Processing Fee</strong></td><td>Up to 0.50%</td><td><span class="badge-pill">Value</span></td></tr>
            <tr><td><strong>Tenure</strong></td><td>Up to 30 Years</td><td><span class="badge-pill">Flexible</span></td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
  <div id="footer-placeholder"></div>
</div>
 
<script src="script.js"></script>
</body>
</html>
