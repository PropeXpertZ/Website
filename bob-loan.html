<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bank of Baroda Home Loan | PropXpertz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="page">
  <div id="header-placeholder"></div>
<section class="bank-hero-section">
    <div class="bank-hero-container">
        <div class="bank-hero-left">
            <div class="bank-title-row">
                <img src="assets/logos/banks-std/BOB.png" alt="BOB Logo" class="bank-page-logo" onerror="this.src='assets/logos/bob.svg'; this.onerror=null;">
                <div><h1>BOB <span class="gold-text">Home Loan</span></h1><p class="bank-tagline">Low interest rates starting from 8.40% p.a.</p></div>
            </div>
            <div class="bank-highlights">
                <div class="highlight-box"><span class="hl-icon">📈</span><span class="hl-label">Rate</span><span class="hl-val">8.40% p.a</span></div>
                <div class="highlight-box"><span class="hl-icon">💰</span><span class="hl-label">Max Loan</span><span class="hl-val">₹20 Cr</span></div>
            </div>
        </div>
        <div class="bank-hero-right">
             <div id="loan-contact-placeholder"></div>
        </div>
    </div>
    </section>

    <section class="sbi-section">
        <h2 class="section-heading">BOB Features</h2>
        <div class="features-table-container">
            <table class="features-table">
                <thead><tr><th>Feature</th><th>Details</th><th>Benefit</th></tr></thead>
                <tbody>
                    <tr><td><strong>Interest Rate</strong></td><td>8.40% - 10.60%</td><td><span class="badge-pill">Very Low</span></td></tr>
                    <tr><td><strong>Processing Fee</strong></td><td>0.25% - 0.50% (Max ₹25k)</td><td><span class="badge-pill">Capped</span></td></tr>
                    <tr><td><strong>Max Tenure</strong></td><td>30 Years</td><td><span class="badge-pill">Flexible</span></td></tr>
                </tbody>
            </table>
        </div>
    </section>
<div id="footer-placeholder"></div>
</div>
 
<script src="script.js"></script>
</body>
</html>
