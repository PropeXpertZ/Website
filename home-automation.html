<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <meta name="description" content="Home Automation by PropXpertz—page under development.">
    <meta name="robots" content="noindex,follow">
    <link rel="canonical" href="https://propxpertz.com/home-automation.html">
    <title>Home Automation | PropXpertz</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="styles.css"> 

    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #0A2540; 
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            
            /* --- THE FIX IS HERE --- */
            /* We added 120px padding to the top to push content below the fixed header */
            padding-top: 120px; 
            padding-bottom: 40px; 
            /* ----------------------- */
        }

        .container { padding: 20px; text-align: center; }
        
        /* Typography overrides */
        .coming-soon-title { font-size: 64px; margin-bottom: 10px; margin-top: 0; line-height: 1.2; }
        .coming-soon-span { color: #C9A227; }
        .coming-soon-text { font-size: 20px; opacity: 0.8; margin-bottom: 30px; }
        
        /* Button Styles */
        .btn-coming-soon { 
            display: inline-block; 
            padding: 15px 40px; 
            background: #C9A227; 
            color: #0A2540; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold; 
            transition: transform 0.3s;
        }
        .btn-coming-soon:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div id="header-placeholder"></div> 

    <div class="main-content">
        <div class="container">
            <h1 class="coming-soon-title">Coming <span class="coming-soon-span">Soon</span></h1>
            <p class="coming-soon-text">Our Home Automation Services Are Under Development.</p>
            <a href="index.html" class="btn-coming-soon">Go Back Home</a>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="script.js"></script>

</body>
</html>
